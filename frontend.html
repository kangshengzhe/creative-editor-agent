<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Creative Editor Agent — Coco AI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;background:#f0f4f8;color:#1e293b;line-height:1.6}
.container{max-width:1400px;margin:0 auto;padding:24px}
h1{text-align:center;font-size:28px;margin-bottom:8px;background:linear-gradient(135deg,#6366f1,#06b6d4);-webkit-background-clip:text;background-clip:text;color:transparent}
.subtitle{text-align:center;color:#64748b;margin-bottom:32px;font-size:14px}
.card{background:#fff;border-radius:16px;padding:24px;box-shadow:0 4px 20px rgba(0,0,0,.08);margin-bottom:24px}
.card h2{font-size:18px;margin-bottom:16px;color:#334155}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group.full{grid-column:1/-1}
label{font-size:13px;font-weight:600;color:#475569}
input,select,textarea{padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;transition:border-color .2s}
input:focus,select:focus,textarea:focus{outline:none;border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
textarea{resize:vertical;min-height:60px}
.btn{display:block;width:100%;padding:14px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;margin-top:20px;transition:transform .2s,box-shadow .2s}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(99,102,241,.3)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.status{text-align:center;padding:12px;color:#64748b;font-size:14px}
.status.error{color:#ef4444}
.results{display:none}
.result-item{background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:16px;margin-bottom:12px;transition:transform .2s}
.result-item:hover{transform:translateX(4px)}
.result-rank{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:12px;font-weight:700;margin-right:10px}
.result-copy{font-size:16px;font-weight:600;color:#1e293b}
.result-scores{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap}
.score-badge{padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600}
.score-composite{background:#ede9fe;color:#6366f1}
.score-compliance{background:#dcfce7;color:#16a34a}
.score-keyword{background:#dbeafe;color:#2563eb}
.score-cta{background:#fef3c7;color:#d97706}
.result-meta{margin-top:8px;font-size:12px;color:#94a3b8}
.timer{font-size:13px;color:#94a3b8;text-align:center;margin-top:8px}
@media(max-width:600px){.form-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
  <h1>🎨 Creative Editor Agent</h1>
  <p class="subtitle">Coco AI 创意编辑工具 — 输入 Brief，AI 自动生成合规广告文案</p>

  <div class="card">
    <h2>📝 创意请求 (Brief)</h2>
    <form id="briefForm" class="form-grid">
      <div class="form-group full">
        <label>活动主题 *</label>
        <input type="text" id="topic" placeholder="例如：Game topup bonus weekend" value="Game topup bonus weekend" required>
      </div>
      <div class="form-group">
        <label>目标平台 *</label>
        <select id="platform">
          <option value="GOOGLE_ADS">Google Ads</option>
          <option value="FACEBOOK_ADS">Facebook Ads</option>
          <option value="TIKTOK_ADS">TikTok Ads</option>
        </select>
      </div>
      <div class="form-group">
        <label>目标市场 *</label>
        <select id="market">
          <option value="EN_GLOBAL">英语全球 (EN_GLOBAL)</option>
          <option value="PH">菲律宾 (PH)</option>
          <option value="TH">泰国 (TH)</option>
          <option value="RU">俄罗斯 (RU)</option>
        </select>
      </div>
      <div class="form-group">
        <label>文案类型 *</label>
        <select id="creativeType">
          <option value="BATCH">🔥 批量（标题+描述+CTA 一起生成）</option>
          <option value="HEADLINE">标题 (≤30字符)</option>
          <option value="DESCRIPTION">描述 (≤90字符)</option>
          <option value="CTA">CTA 行动号召 (≤15字符)</option>
          <option value="LONG_COPY">长文案 (≤300字符)</option>
        </select>
      </div>
      <div class="form-group">
        <label>SEO 关键词（逗号分隔）</label>
        <input type="text" id="keywords" placeholder="topup, bonus" value="topup">
      </div>
      <div class="form-group full">
        <label>卖点（逗号分隔）</label>
        <input type="text" id="sellingPoints" placeholder="20% bonus, instant credit" value="20% bonus, instant credit">
      </div>
      <button type="submit" class="btn" id="submitBtn">🚀 生成广告创意</button>
    </form>
    <div class="status" id="status"></div>
    <div class="timer" id="timer"></div>
  </div>

  <div class="card results" id="resultsCard">
    <h2>📊 AB_Ranking 结果</h2>
    <div id="resultsMeta"></div>
    <div id="resultsList"></div>
  </div>
</div>

<script>
const form = document.getElementById('briefForm');
const statusEl = document.getElementById('status');
const timerEl = document.getElementById('timer');
const resultsCard = document.getElementById('resultsCard');
const resultsMeta = document.getElementById('resultsMeta');
const resultsList = document.getElementById('resultsList');
const submitBtn = document.getElementById('submitBtn');

let timerInterval = null;

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  
  // 构建 Brief JSON
  const creativeType = document.getElementById('creativeType').value;
  const isBatch = creativeType === 'BATCH';

  const brief = {
    campaign_topic: document.getElementById('topic').value.trim(),
    target_platform: document.getElementById('platform').value,
    target_market: document.getElementById('market').value,
    keywords: document.getElementById('keywords').value.split(',').map(s => s.trim()).filter(Boolean),
    selling_points: document.getElementById('sellingPoints').value.split(',').map(s => s.trim()).filter(Boolean),
    source_language: 'en',
  };
  if (!isBatch) {
    brief.creative_type = creativeType;
  }

  // UI 状态
  submitBtn.disabled = true;
  submitBtn.textContent = isBatch ? '⏳ 批量生成中（约2-3分钟）...' : '⏳ 生成中...';
  statusEl.textContent = isBatch
    ? '正在生成 标题 + 描述 + CTA 三种类型，请耐心等待...'
    : '正在调用 AI 生成广告创意，请耐心等待（通常 30-120 秒）...';
  statusEl.className = 'status';
  resultsCard.style.display = 'none';
  resultsList.innerHTML = '';

  // 计时器
  const startTime = Date.now();
  timerEl.textContent = '已用时: 0s';
  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    timerEl.textContent = `已用时: ${elapsed}s`;
  }, 1000);

  try {
    const endpoint = isBatch ? '/api/creative/batch' : '/api/creative';
    const resp = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(brief),
    });
    const data = await resp.json();
    
    clearInterval(timerInterval);
    const totalTime = Math.floor((Date.now() - startTime) / 1000);
    timerEl.textContent = `总用时: ${totalTime}s`;

    if (resp.ok || resp.status === 207) {
      if (isBatch) {
        // 批量模式：三列并排展示
        const types = ['headlines', 'descriptions', 'ctas'];
        const typeLabels = { headlines: '📝 标题', descriptions: '📄 描述', ctas: '🎯 CTA' };
        let totalCandidates = 0;

        let html = '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;align-items:start">';
        for (const t of types) {
          html += '<div style="background:#fff;border-radius:14px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.06);min-height:300px">';
          html += `<h3 style="margin:0 0 14px;color:#334155;font-size:16px;text-align:center;padding-bottom:10px;border-bottom:2px solid #e2e8f0">${typeLabels[t]}</h3>`;
          if (data[t] && data[t].ranked_candidates) {
            totalCandidates += data[t].ranked_candidates.length;
            html += data[t].ranked_candidates.map((c, i) => `
              <div class="result-item" onclick="toggleDetail(this)" style="cursor:pointer;margin-bottom:10px;padding:14px;border-radius:10px;background:#f8fafc;border:1px solid #e2e8f0">
                <div style="display:flex;align-items:flex-start;gap:8px">
                  <span class="result-rank" style="width:24px;height:24px;font-size:11px;flex-shrink:0">${i + 1}</span>
                  <span style="font-size:14px;font-weight:600;line-height:1.4">${escapeHtml(c.source_copy)}</span>
                </div>
                <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
                  <span class="score-badge score-composite" style="font-size:11px;padding:3px 8px">综合 ${c.composite_score.toFixed(2)}</span>
                  <span class="score-badge score-compliance" style="font-size:11px;padding:3px 8px">合规 ${c.compliance_report.compliance_score.toFixed(2)}</span>
                  <span class="score-badge score-keyword" style="font-size:11px;padding:3px 8px">词 ${c.keyword_coverage.toFixed(2)}</span>
                  <span class="score-badge score-cta" style="font-size:11px;padding:3px 8px">CTA ${c.cta_strength_score.toFixed(2)}</span>
                </div>
                <div class="result-detail" style="display:none;margin-top:10px;padding-top:10px;border-top:1px solid #e2e8f0;font-size:12px;color:#475569;line-height:1.6">
                  <div><b>命中:</b> ${c.hit_keywords?.length ? c.hit_keywords.join(', ') : '无'}</div>
                  <div><b>跳过:</b> ${c.skipped_keywords?.length ? c.skipped_keywords.join(', ') : '无'}</div>
                  ${Object.keys(c.localized_versions||{}).length ? '<div><b>翻译:</b> ' + Object.entries(c.localized_versions).map(([k,v]) => k + ': ' + escapeHtml(v)).join(' | ') + '</div>' : ''}
                  ${c.warnings?.length ? '<div style="color:#d97706"><b>⚠️</b> ' + c.warnings.join('; ') + '</div>' : ''}
                </div>
              </div>
            `).join('');
          } else if (data.errors && data.errors[t]) {
            html += `<p style="color:#ef4444;font-size:13px;padding:12px;text-align:center">❌ ${data.errors[t].error?.message || '生成失败'}</p>`;
          }
          html += '</div>';
        }
        html += '</div>';

        statusEl.textContent = `✅ 批量生成完成！共 ${totalCandidates} 条候选，用时 ${(data.total_time_ms/1000).toFixed(1)}s`;
        resultsCard.style.display = 'block';
        resultsMeta.innerHTML = `<p style="font-size:13px;color:#64748b">批量模式 | 总用时: ${(data.total_time_ms/1000).toFixed(1)}s${data.errors ? ' | ⚠️ 部分类型失败' : ''}</p>`;
        resultsList.innerHTML = html;
      } else {
        // 单类型模式
        statusEl.textContent = `✅ 成功！生成了 ${data.ranked_candidates.length} 条候选，用时 ${(data.generation_time_ms/1000).toFixed(1)}s`;
        statusEl.className = 'status';
        renderResults(data);
      }
    } else {
      statusEl.textContent = `❌ 错误: ${data.status || resp.status} — ${data.error?.message || '未知错误'}`;
      statusEl.className = 'status error';
    }
  } catch (err) {
    clearInterval(timerInterval);
    statusEl.textContent = `❌ 网络错误: ${err.message}`;
    statusEl.className = 'status error';
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = '🚀 生成广告创意';
  }
});

function renderResults(data) {
  resultsCard.style.display = 'block';
  
  resultsMeta.innerHTML = `
    <p style="font-size:13px;color:#64748b;margin-bottom:12px">
      request_id: ${data.request_id} | 
      总生成: ${data.total_candidates_generated} | 
      过滤: ${data.total_candidates_filtered_out} | 
      补充轮次: ${data.refill_count}
      ${data.warnings?.length ? ' | ⚠️ ' + data.warnings.join(', ') : ''}
    </p>
  `;

  resultsList.innerHTML = renderCandidateList(data.ranked_candidates);
}

function renderCandidateList(candidates) {
  return candidates.map((c, i) => `
    <div class="result-item" onclick="toggleDetail(this)" style="cursor:pointer">
      <div>
        <span class="result-rank">${i + 1}</span>
        <span class="result-copy">${escapeHtml(c.source_copy)}</span>
      </div>
      <div class="result-scores">
        <span class="score-badge score-composite">综合 ${c.composite_score.toFixed(3)}</span>
        <span class="score-badge score-compliance">合规 ${c.compliance_report.compliance_score.toFixed(2)}</span>
        <span class="score-badge score-keyword">关键词 ${c.keyword_coverage.toFixed(2)}</span>
        <span class="score-badge score-cta">CTA ${c.cta_strength_score.toFixed(2)}</span>
      </div>
      <div class="result-meta">
        ${c.hit_keywords?.length ? '✅ 命中: ' + c.hit_keywords.join(', ') : ''}
        ${c.skipped_keywords?.length ? ' | ⚠️ 跳过: ' + c.skipped_keywords.join(', ') : ''}
        ${c.warnings?.length ? ' | 💡 ' + c.warnings.join('; ') : ''}
        ${Object.keys(c.localized_versions || {}).length ? ' | 🌐 ' + Object.keys(c.localized_versions).join(', ') : ''}
      </div>
      <div class="result-detail" style="display:none;margin-top:12px;padding-top:12px;border-top:1px solid #e2e8f0;font-size:13px;color:#475569">
        <p style="margin-bottom:4px;color:#94a3b8;font-size:11px">👆 点击展开/收起详情</p>
        <table style="width:100%;border-collapse:collapse;font-size:12px">
          <tr><td style="padding:4px 8px;font-weight:600;width:120px">candidate_id</td><td>${c.candidate_id}</td></tr>
          <tr><td style="padding:4px 8px;font-weight:600">composite_score</td><td>${c.composite_score.toFixed(4)}</td></tr>
          <tr><td style="padding:4px 8px;font-weight:600">compliance_score</td><td>${c.compliance_report.compliance_score.toFixed(4)}</td></tr>
          <tr><td style="padding:4px 8px;font-weight:600">keyword_coverage</td><td>${c.keyword_coverage.toFixed(4)}</td></tr>
          <tr><td style="padding:4px 8px;font-weight:600">cta_strength_score</td><td>${c.cta_strength_score.toFixed(4)}</td></tr>
          <tr><td style="padding:4px 8px;font-weight:600">hit_keywords</td><td>${JSON.stringify(c.hit_keywords)}</td></tr>
          <tr><td style="padding:4px 8px;font-weight:600">skipped_keywords</td><td>${JSON.stringify(c.skipped_keywords)}</td></tr>
          <tr><td style="padding:4px 8px;font-weight:600">violations</td><td>${c.compliance_report.violations.length === 0 ? '无违规 ✅' : c.compliance_report.violations.map(v => v.category + '(' + v.severity + '): ' + (v.matched_term||'') + ' → ' + v.suggestion).join('<br>')}</td></tr>
          <tr><td style="padding:4px 8px;font-weight:600">localized_versions</td><td>${Object.keys(c.localized_versions||{}).length === 0 ? '无翻译' : Object.entries(c.localized_versions).map(([k,v]) => '<b>' + k + '</b>: ' + escapeHtml(v)).join('<br>')}</td></tr>
          <tr><td style="padding:4px 8px;font-weight:600">warnings</td><td>${c.warnings?.length ? c.warnings.join('<br>') : '无'}</td></tr>
        </table>
      </div>
    </div>
  `).join('');
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function toggleDetail(el) {
  const detail = el.querySelector('.result-detail');
  if (detail) {
    detail.style.display = detail.style.display === 'none' ? 'block' : 'none';
  }
}
</script>
</body>
</html>
